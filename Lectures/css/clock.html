
<time><section id="clock"></section></time>

<script>
function checkTime(i) {
    if (i < 10) {i = "0" + i};  // add zero in front of numbers < 10
    return i;
}

var x = setInterval(function() {
    var now = new Date();
    var h = now.getHours();
    var m = now.getMinutes();
    var s = now.getSeconds();
    document.getElementById("clock").innerHTML = h + ":" + checkTime(m) + ":" + checkTime(s);
    //document.getElementById("clock").style.color = "#ffa733";
}, 1000);

</script>
