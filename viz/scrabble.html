<!-- <body onload="init()"> -->
<body onload="reset()"
<div id="applet">
  <div id="crtls">
    <div class="buttonRow">
      <button type="button" onclick="draw()">Draw</button>
      <button type="button" id="reset" onclick="reset()">Reset</button>
    </div>
    <div class="buttonRow">
      <button type="button" id="play" class="play"></button>
      <div id="sliders" class="hidden">
        <input id="speed" type="range" min="1" max="10" value="1" step="1" style="width: 100%; height: 10px"/>
        <!-- <div  class="sliderTitle">Speed</div> -->
      </div>
    </div>
  </div>

  <div class="rack" id="rack">
  </div>
  <div id="mean">&nbsp;</div>
  <div class="toggle">
    <label class="switch">
      <input type="checkbox" id="switch">
      <span class="slider round" onclick="plotSwitch()"></span>
    </label>
  </div>
  <div id="plot" class="hidden"></div>
  </div>

<script src="./scrabble/scrabble.js"></script>
