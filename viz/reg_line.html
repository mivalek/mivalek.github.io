<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Regression formula | Milan Valasek</title>
    <script src="https://d3js.org/d3.v4.js"></script>
    <link rel="stylesheet" href="regression_line/style.css">
  </head>

  <body>

    <div id="panel">
      <div id="sliders">

        <div id="interceptSlider">
          <div class="sliderTitle">Intercept</div>
          <input id="intercept" class="intercept"  type="range" min="-5" max="5" value="0" step="0.01" style="width: 100%; min-width: 250px"/>
        </div>

        <div id="slopeSlider">
          <div  class="sliderTitle">Slope</div>
          <input id="slope" class="slope" type="range" min="-5" max="5" value="0" step="0.01" style="width: 100%; min-width: 250px"/>
        </div>
      </div>

      <div id="equation">
        <div>y = <i>b</i><sub>0</sub> + <i>b</i><sub>1</sub> &times; x</div>
        = <span id="intercept-value"></span>
          <span id="slope-value"></span>&times; x
      </div>
    </div>

<!-- Create a div where the graph will take place -->
  <div id="plot"></div>
  <script src="regression_line/reg_line.js"></script>

</body>
