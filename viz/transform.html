
<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Transformations | Milan Valasek </title>
  <script src="https://d3js.org/d3.v4.js"></script>
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-MML-AM_SVG">
  </script>
    </script>
  <link rel="stylesheet" href="./transform/style.css">

</head>

<body onload="reset()">
<div id="applet">
  <div id="ctrls">
    <div class="ctrl add">
      <div>&plus;</div>
      <div class="toggle">
        <label class="switch">
          <input type="checkbox" id="addSwitch">
          <span class="slider round" onclick="addSwitch()"></span>
        </label>
      </div>
      <div id="add"></div>
    </div>
    <div class="ctrl mult">
      <div>&times;</div>
      <div class="toggle">
        <label class="switch">
          <input type="checkbox" id="multSwitch">
          <span class="slider round" onclick="multSwitch()"></span>
        </label>
      </div>
      <div id="mult"></div>
    </div>
  </div>
  <div id="box">
    <div id="plot"></div>
    <div id="slider">
    <input id="xValue" type="range" min="0" max="200" value="0" step="1" style="width: 100%; height: 10px"/>
  </div>
  <div>Slide to change value of \(x\)</div>
  </div>
</div>

  <script src="./transform/transform.js"></script>
</body>
